<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മലയാളംലാങ് IDE</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>മലയാളം ഭാഷ</h1>

        <h3 id="modeTitle"></h3>

        <div class="editor-box">

            <div class="panel">

                <h2>മലയാളം കോഡ്</h2>

                <textarea
                    id="code"
                    placeholder="Write MalayalamLang code here..."
                ></textarea>

                <button onclick="runCode()">
                    പ്രവർത്തിപ്പിക്കുക
                </button>

            </div>

            <div class="panel">


            </div>

        </div>

        <div class="output-panel">

            <h2>Output</h2>

            <pre id="output"></pre>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
