<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മലയാളംലാങ് IDE</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>മലയാളം ഭാഷ IDE</h1>

        <h3 id="modeTitle"></h3>

        <div class="editor-box">

            <div class="panel">

                <h2>മലയാളം കോഡ്</h2>

                <textarea id="code" placeholder="Write MalayalamLang code here..."></textarea>

                <button onclick="runCode()">പ്രവർത്തിപ്പിക്കുക</button>

            </div>

        </div>

        <div class="output-panel">

            <h3>Output</h3>
            <pre id="output"></pre>

            <h3>Python Code</h3>
            <pre id="python"></pre>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
